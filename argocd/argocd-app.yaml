apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: resume-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/11ashwin/devsecops_html.git
    targetRevision: main
    path: kubernetes

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
